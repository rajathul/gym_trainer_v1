<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Squat Coach MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css?v=3" />
  </head>
  <body>
    <main class="phone-shell">
      <div class="phone-frame">
        <div class="camera-stage" id="cameraStage">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>

          <div class="overlay-content">
            <div class="rep-count" id="repCount">0</div>
            <div class="instructions" id="instructions">
              Press Start to begin your session.
            </div>
          </div>

          <div class="status-pill" id="pipelineStatus">Model not started</div>
        </div>

        <footer class="footer-bar">
          <div class="status-row">
            <span class="status-label">Status:</span>
            <span class="status-value" id="repState">STANDING</span>
          </div>
          <div class="button-row">
            <button id="startButton" class="footer-button primary">Start</button>
            <button id="resetButton" class="footer-button" disabled>Reset</button>
            <button id="toggleTextButton" class="footer-button" disabled>
              Toggle<br />Text
            </button>
            <button id="toggleSoundButton" class="footer-button" disabled>
              Toggle<br />Sound
            </button>
          </div>
        </footer>
      </div>

      <div class="voice-panel">
        <div class="voice-head">
          <div>
            <h2>Voice Coach</h2>
            <p class="voice-sub">Web Speech API</p>
          </div>
          <button id="loadVoiceBtn" class="load-voice-btn">Load Voice Coach</button>
        </div>
        <p id="voiceStatus" class="voice-status">Click to activate voice coaching.</p>
        <div id="voiceSessionInfo" style="display:none" class="voice-session">
          <span class="voice-mic">🎙</span>
          <span id="voicePhase">Waiting…</span>
          <span id="voiceSetProgress" class="voice-progress"></span>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
    <script src="./calibration.config.js"></script>
    <script src="./calibration.local.js" onerror="this.remove()"></script>
    <script src="./app.js?v=3"></script>
    <script type="module" src="./voice.js"></script>
  </body>
</html>
